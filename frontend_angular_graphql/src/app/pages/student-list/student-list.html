
<div class="max-w-3xl mx-auto p-6 bg-white shadow-lg rounded-2xl">

  <h3 class="text-xl font-semibold mb-4">Student Management</h3>

  <!-- Error -->
  @if (error) {
  <div class="bg-red-100 text-red-600 p-3 rounded mb-4">
    {{ error }}
  </div>
  }

  <!-- Form -->
  <form class="space-y-4 mb-6" [formGroup]="studentForm" (ngSubmit)="onSubmit()">
    <input type="text" placeholder="First Name" formControlName="firstname"
      class="w-full border p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-400" />

    <input type="text" placeholder="Last Name" formControlName="lastname"
      class="w-full border p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-400" />

    <input type="email" placeholder="Email" formControlName="email"
      class="w-full border p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-400" />

    <div class="flex gap-2">
      <button type="submit" [disabled]="studentForm.invalid"
        class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">
        {{ isEditMode ? 'Update Student' : 'Add Student' }}
      </button>

      @if (isEditMode) {
      <button type="button" (click)="resetForm()" class="bg-gray-400 text-white px-4 py-2 rounded hover:bg-gray-500">
        Cancel
      </button>
      }
    </div>
  </form>

  <!-- Student List -->
  @if (students.length) {
  <div class="space-y-3">
    @for (student of students; track student._id) {
    <div class="flex justify-between items-center p-4 bg-gray-50 rounded shadow-sm">

      <!-- Student Info -->
      <div>
        <p class="font-semibold text-lg">
          {{ student.firstname }} {{ student.lastname }}
        </p>
        <p class="text-sm text-gray-600">{{ student.email }}</p>
      </div>

      <!-- Actions -->
      <div class="flex gap-2">

        <button (click)="selectStudent(student)" class="bg-yellow-400 px-3 py-1 rounded text-white hover:bg-yellow-500">
          Edit
        </button>

        <button (click)="deleteStudent(student._id)" class="bg-red-500 px-3 py-1 rounded text-white hover:bg-red-600">
          Delete
        </button>

        <a [routerLink]="['/students-details', student._id]"
          class="bg-green-500 px-3 py-1 rounded text-white hover:bg-green-600">
          View
        </a>

      </div>
    </div>
    }
  </div>
  } @else {
  <p class="text-gray-500 text-center">No students found.</p>
  }

</div>
